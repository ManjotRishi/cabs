services:
  mongo:
    image: mongo:7
    container_name: rideshare-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init-replica:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      [
        "sh",
        "-c",
        "mongosh --host mongo:27017 --eval \"try { rs.status() } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }]}) }\""
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rideshare-api
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/rideshare?replicaSet=rs0
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "5000:5000"

volumes:
  mongo_data:
